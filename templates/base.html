<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gramm Pool 2026{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <noscript><meta http-equiv="refresh" content="60"></noscript>
</head>
<body>
    <header>
        <div class="container header-inner">
            <a href="/" class="logo">Gramm Pool 2026</a>
            <span class="subtitle">NCAA Tournament Tracker</span>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <p>
            Last updated: <span id="last-updated">{{ last_updated.strftime('%I:%M:%S %p') if last_updated else 'Loading...' }}</span>
            &middot; Auto-refreshes every 60s
        </p>
    </footer>
    {% block scripts %}{% endblock %}
</body>
</html>
